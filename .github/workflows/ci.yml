name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check media_pruner/ tests/

      - name: Format check with Ruff
        run: |
          ruff format --check media_pruner/ tests/

      - name: Type check with mypy
        run: |
          mypy media_pruner/

      - name: Run tests (unit + functional)
        run: |
          pytest -v -m "not integration" --cov=media_pruner --cov-report=term-missing tests/

      - name: Upload coverage to GitHub
        if: matrix.python-version == '3.12' && matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
